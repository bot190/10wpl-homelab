---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gatus
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: gatus
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    fullnameOverride: gatus
    deploymentAnnotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      - name: init-db
        image: ghcr.io/onedr0p/postgres-init:16
        envFrom: &envFrom
          - secretRef:
              name: gatus-secret
    gatus:
      image:
        repository: twinproduction/gatus
        tag: experimental
        # tag: v5.11.0@sha256:eb0374eb55e3ff84ec8f9ea10342ddb623cfba23e5836138896cde01f11cf23d
      port: &port 80
      delayStartSeconds: "5"
      env:
        TZ: "${TIMEZONE}"
      envFrom: *envFrom
      livenessProbe: &probes
        httpGet:
          path: /health
          port: http
        initialDelaySeconds: 0
        periodSeconds: 10
        timeoutSeconds: 1
        failureThreshold: 3
      readinessProbe: *probes
    sidecar:
      image:
        tag: 0.3.2
        digest: sha256:c6550b40f444337d953e622b3ad6dd9b28e80a664dfcd59d0f8551997e870b8e
      ingressClasses:
        - nginx
      kinds:
        ingress:
          enable: true
          auto: true
        httproute:
          enable: false
          auto: false
        service:
          enable: true
          auto: false
        ingressroute:
          enable: false
          auto: false
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: "${SECURITY_CONTEXT_RUN_AS_USER}"
      runAsGroup: "${SECURITY_CONTEXT_RUN_AS_GROUP}"
      fsGroup: "${SECURITY_CONTEXT_RUN_AS_GROUP}"
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile: { type: RuntimeDefault }
    resources:
      requests:
        cpu: 10m
      limits:
        memory: 300Mi
    service:
      port: *port
    monitoring:
      serviceMonitor:
        enabled: true
        interval: 1m
        scrapeTimeout: 10s
    ingress:
      enabled: true
      annotations:
        hajimari.io/icon: eos-icons:monitoring
      className: nginx
      hosts:
        - host: &host "{{ .Release.Name }}.${SECRET_DOMAIN}"
          paths:
            - path: /
              pathType: Prefix
      tls:
        - hosts:
            - *host
    config:
      existingConfigMap: gatus-configmap
      items:
        - key: config.yaml
          path: config.yaml
