---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./secret.sops.yaml
  - ./helmrelease.yaml
generatorOptions:
  disableNameSuffixHash: true
configMapGenerator:
  - name: asterisk-configmap
    files:
      - extensions.conf=./config/asterisk/extensions.conf
      - features.conf=./config/asterisk/features.conf
      - logger.conf=./config/asterisk/logger.conf
      - modules.conf=./config/asterisk/modules.conf
      - pjsip.conf=./config/asterisk/pjsip.conf
      - rtp.conf=./config/asterisk/rtp.conf
      - voicemail.conf=./config/asterisk/voicemail.conf
  - name: asterisk-tftp-configmap
    files:
      - dialplan.xml=./config/tftp/dialplan.xml
      - SEPAAAAAAAAAAAA.cnf.xml.template=./config/tftp/SEPAAAAAAAAAAAA.cnf.xml.template
